<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — ITStar Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Urbanist:ital,wght@0,100..900;1,100..900&family=DM+Mono:wght@400;500&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <script>
    // Prevents FOUC by setting theme immediately
    const theme = localStorage.getItem('orion-theme');
    if (theme === 'dark' || (!theme && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
      document.documentElement.classList.add('dark-theme');
    } else if (theme === 'light') {
      document.documentElement.classList.add('light-theme');
    }
  </script>
  <style>
    html,
    body {
      height: 100%;
      margin: 0;
    }

    .login-page {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: var(--orion-surface-1);
    }

    .login-card {
      width: 100%;
      max-width: 400px;
      background: var(--orion-surface-0);
      border: 1px solid var(--orion-border-subtle);
      border-radius: var(--radius-2xl);
      box-shadow: var(--shadow-lg);
      padding: var(--space-8);
    }

    .brand-logo {
      display: flex;
      align-items: center;
      gap: var(--space-3);
      margin-bottom: var(--space-8);
    }

    .brand-mark {
      width: 40px;
      height: 40px;
      background: var(--orion-yellow);
      border-radius: var(--radius-md);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .brand-title {
      font-size: var(--text-xl);
      font-weight: var(--weight-semibold);
      letter-spacing: -0.01em;
      flex: 1;
    }

    .theme-toggle-container {
      display: flex;
      justify-content: flex-end;
    }

    .login-heading {
      font-size: var(--text-2xl);
      font-weight: var(--weight-semibold);
      letter-spacing: -0.02em;
      margin-bottom: var(--space-2);
    }

    .login-subheading {
      color: var(--orion-text-secondary);
      font-size: var(--text-sm);
      margin-bottom: var(--space-6);
    }

    .login-form {
      display: flex;
      flex-direction: column;
      gap: var(--space-4);
    }

    /* Input group overrides for full width */
    .login-form .input-group {
      max-width: none;
    }

    .login-actions {
      margin-top: var(--space-6);
    }

    .forgot-password {
      text-align: right;
      margin-top: var(--space-2);
    }

    .forgot-password a {
      font-size: var(--text-xs);
      color: var(--orion-text-secondary);
      text-decoration: none;
    }

    .forgot-password a:hover {
      color: var(--orion-text-primary);
    }
  </style>
</head>

<body>
  <div class="login-page">
    <div class="login-card">
      <div class="brand-logo">
        <div class="brand-mark">
          <svg width="24" height="24" viewBox="0 0 40 40" fill="none">
            <circle cx="20" cy="20" r="16" stroke="#111110" stroke-width="2.5" />
            <path d="M12 20h16M20 12v16" stroke="#111110" stroke-width="2.5" stroke-linecap="round" />
          </svg>
        </div>
        <div class="brand-title">SOSO (Strategy Operating System for organizations)</div>
        <div class="theme-toggle-container">
          <button id="theme-toggle" class="btn btn-ghost btn-sm btn-icon" aria-label="Toggle theme">
            <svg class="sun-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
              stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none;">
              <circle cx="12" cy="12" r="5"></circle>
              <line x1="12" y1="1" x2="12" y2="3"></line>
              <line x1="12" y1="21" x2="12" y2="23"></line>
              <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
              <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
              <line x1="1" y1="12" x2="3" y2="12"></line>
              <line x1="21" y1="12" x2="23" y2="12"></line>
              <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
              <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
            </svg>
            <svg class="moon-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
              stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
            </svg>
          </button>
        </div>
      </div>

      <h1 class="login-heading">Welcome back</h1>
      <p class="login-subheading">Enter your credentials to access the dashboard</p>

      <form class="login-form" action="index.html">
        <div class="input-group">
          <label class="input-label" for="email">Email address</label>
          <div class="input-with-icon">
            <svg class="input-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor"
              stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path>
              <polyline points="22,6 12,13 2,6"></polyline>
            </svg>
            <input type="email" id="email" class="input" placeholder="name@company.com" required>
          </div>
        </div>

        <div class="input-group">
          <label class="input-label" for="password">Password</label>
          <div class="input-with-icon">
            <svg class="input-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor"
              stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
              <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
            </svg>
            <input type="password" id="password" class="input" placeholder="••••••••" required>
          </div>
          <div class="forgot-password">
            <a href="#">Forgot password?</a>
          </div>
        </div>

        <div class="login-actions">
          <button type="submit" class="btn btn-primary"
            style="width:100%; height:44px; font-size:var(--text-base);">Sign in</button>
        </div>

        <div style="text-align: center; margin-top: var(--space-6); font-size: var(--text-sm); color: var(--orion-text-secondary);">
          Don't have an account? <a href="register.html" style="color: var(--orion-text-primary); font-weight: 600; text-decoration: none;">Create an organization</a>
        </div>
      </form>
    </div>
  </div>

  <script>
    const toggleBtn = document.getElementById('theme-toggle');
    const htmlEl = document.documentElement;
    const sunIcon = toggleBtn.querySelector('.sun-icon');
    const moonIcon = toggleBtn.querySelector('.moon-icon');

    function updateIcons() {
      const isDark = htmlEl.classList.contains('dark-theme') ||
        (!htmlEl.classList.contains('light-theme') && window.matchMedia('(prefers-color-scheme: dark)').matches);
      if (isDark) {
        sunIcon.style.display = 'block';
        moonIcon.style.display = 'none';
      } else {
        sunIcon.style.display = 'none';
        moonIcon.style.display = 'block';
      }
    }

    // Set initial icon state
    updateIcons();

    toggleBtn.addEventListener('click', () => {
      const isDark = htmlEl.classList.contains('dark-theme') ||
        (!htmlEl.classList.contains('light-theme') && window.matchMedia('(prefers-color-scheme: dark)').matches);

      if (isDark) {
        htmlEl.classList.remove('dark-theme');
        htmlEl.classList.add('light-theme');
        localStorage.setItem('orion-theme', 'light');
      } else {
        htmlEl.classList.remove('light-theme');
        htmlEl.classList.add('dark-theme');
        localStorage.setItem('orion-theme', 'dark');
      }
      updateIcons();
    });
  </script>
</body>

</html>
